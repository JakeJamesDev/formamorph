name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# GITHUB_TOKEN needs write scopes to comment, set the status check, and store signatures.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Run on PR events, or when a contributor posts the sign / "recheck" comment.
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Signatures are stored in this repo on `main`. (Switch `branch` to a dedicated,
          # unprotected branch if you'd rather keep them out of the main history.)
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/JakeJamesDev/formamorph/blob/main/CLA.md'
          branch: 'main'
          # Maintainer + automated bots never need to sign.
          allowlist: JakeJamesDev,*[bot]
